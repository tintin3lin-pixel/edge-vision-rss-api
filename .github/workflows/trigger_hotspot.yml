name: 热点捕捉定时触发

on:
  schedule:
    # 每 2 小时触发一次（UTC 时间，覆盖全天 24 小时）
    - cron: '0 0 * * *'   # 08:00 CST
    - cron: '0 2 * * *'   # 10:00 CST
    - cron: '0 4 * * *'   # 12:00 CST
    - cron: '0 6 * * *'   # 14:00 CST
    - cron: '0 8 * * *'   # 16:00 CST
    - cron: '0 10 * * *'  # 18:00 CST
    - cron: '0 12 * * *'  # 20:00 CST
    - cron: '0 14 * * *'  # 22:00 CST
    - cron: '0 16 * * *'  # 00:00 CST
    - cron: '0 18 * * *'  # 02:00 CST
    - cron: '0 20 * * *'  # 04:00 CST
    - cron: '0 22 * * *'  # 06:00 CST
  # 允许手动触发（测试用）
  workflow_dispatch:

jobs:
  trigger-dify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 触发 Dify 热点捕捉工作流
        run: |
          echo "触发时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M CST')"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 300 \
            -X POST "https://api.dify.ai/v1/workflows/run" \
            -H "Authorization: Bearer app-mxvWi6WG9xCY72BWxhG4kQLJ" \
            -H "Content-Type: application/json" \
            -d '{"inputs": {}, "response_mode": "blocking", "user": "github-actions-scheduler"}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP 状态码: $HTTP_CODE"
          echo "响应内容: $BODY"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "工作流触发成功"
            PUSHED=$(echo "$BODY" | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    outputs = d.get('data', {}).get('outputs', {})
    print(f'推送结果: {outputs.get(\"result_summary\", \"无摘要\")}')
    print(f'推送数量: {outputs.get(\"pushed_count\", 0)} 条')
except:
    print('解析响应完成')
" 2>/dev/null || echo "")
            echo "$PUSHED"
          else
            echo "工作流触发失败，HTTP 状态码: $HTTP_CODE"
            exit 1
          fi
